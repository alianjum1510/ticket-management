services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/app.db
      ENVIRONMENT: local
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-docker-secret-change-me}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  backend_data:
